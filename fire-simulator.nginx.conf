# NOTE: This file is kept as a reference only.
# The canonical nginx config for fire.festas-builds.com is managed centrally in:
#   Festas/Link-in-Bio — nginx/sites-available/fire.festas-builds.com.conf

server {
    listen 80;
    server_name fire.festas-builds.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name fire.festas-builds.com;

    # --- TLS certificates (managed by certbot) ---
    ssl_certificate     /etc/letsencrypt/live/fire.festas-builds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fire.festas-builds.com/privkey.pem;

    # --- Recommended SSL settings (via certbot) ---
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Proxy to Docker container ---
    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

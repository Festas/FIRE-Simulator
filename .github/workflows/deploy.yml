name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: "fire-simulator/,docker-compose.yml,fire-simulator.nginx.conf"
          target: "/opt/fire-simulator"

      - name: Build and restart containers
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            cd /opt/fire-simulator
            docker compose down --remove-orphans
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
            # Ensure nginx picks up the site config
            ln -sf /opt/fire-simulator/fire-simulator.nginx.conf /etc/nginx/sites-enabled/fire-simulator.conf
            nginx -t && systemctl reload nginx

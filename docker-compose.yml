services:
  fire-simulator:
    build:
      context: ./fire-simulator
      dockerfile: Dockerfile
    container_name: fire-simulator
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - fire-simulator

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
    driver: bridge
